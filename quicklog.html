<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quick Log">
<title>Quick Log — David Robles</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #38c98e;
    --warn: #f7a44f;
    --danger: #f75f5f;
    --text: #e8eaf2;
    --text2: #8892a8;
    --text3: #5a6278;
    --serif: 'DM Serif Display', serif;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    font-size: 16px;
    overscroll-behavior: none;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }

  .header-title {
    font-family: var(--serif);
    font-size: 22px;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .back-btn {
    font-size: 12px;
    color: var(--text3);
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* STEP LABEL */
  .step-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    font-weight: 500;
    margin-bottom: 10px;
  }

  .step { margin-bottom: 22px; }

  /* CLIENT SELECTOR */
  .client-btn {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 17px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.15s;
    text-align: left;
  }

  .client-btn.selected {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(79,142,247,0.07);
  }

  .client-btn:active { transform: scale(0.98); }

  /* DROPDOWN */
  .dropdown-wrap { position: relative; }

  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px;
    z-index: 100;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .dropdown-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .dropdown-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    outline: none;
  }

  .dropdown-list { max-height: 260px; overflow-y: auto; }

  .dropdown-item {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    color: var(--text);
    transition: background 0.1s;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:active { background: var(--surface2); }

  /* BIG BUTTONS GRID */
  .big-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .big-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 22px 14px;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    line-height: 1.4;
    transition: all 0.15s;
  }

  .big-btn:active { transform: scale(0.97); }

  .big-btn.type-selected {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(56,201,142,0.07);
  }

  .big-btn.method-selected {
    border-color: var(--warn);
    color: var(--warn);
    background: rgba(247,164,79,0.07);
  }

  .big-btn-icon { font-size: 26px; display: block; margin-bottom: 8px; }

  /* LOCKED STEP */
  .step.locked {
    opacity: 0.35;
    pointer-events: none;
  }

  /* CONFIRM CARD */
  .confirm-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .confirm-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .confirm-row:last-child { border-bottom: none; }
  .confirm-label { color: var(--text3); }
  .confirm-value { color: var(--text); font-weight: 500; }

  /* LOG BUTTON */
  .log-btn {
    width: 100%;
    background: var(--accent2);
    border: none;
    border-radius: 16px;
    padding: 22px;
    color: #fff;
    font-family: var(--sans);
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .log-btn:active { transform: scale(0.98); background: #2db87d; }

  /* BADGE */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
  }
  .badge-dc { background: rgba(79,142,247,0.15); color: var(--accent); }
  .badge-sms { background: rgba(56,201,142,0.15); color: var(--accent2); }
  .badge-emora { background: rgba(247,164,79,0.15); color: var(--warn); }
  .badge-me { background: rgba(247,95,95,0.15); color: var(--danger); }

  /* SUCCESS */
  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex: 1;
    padding: 20px;
  }

  .success-icon { font-size: 72px; margin-bottom: 20px; }

  .success-title {
    font-family: var(--serif);
    font-size: 30px;
    margin-bottom: 10px;
  }

  .success-sub {
    color: var(--text2);
    font-size: 15px;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .success-time {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 32px;
  }

  .again-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 32px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
    width: 100%;
    transition: border-color 0.15s;
  }

  .again-btn:active { transform: scale(0.98); }

  .main-app-link {
    font-size: 13px;
    color: var(--text3);
    text-decoration: none;
    display: block;
    margin-top: 8px;
  }

  /* DATE DISPLAY */
  .today-badge {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    margin-bottom: 24px;
  }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-title">Quick Log</div>
      <div class="header-sub">David Robles, LMSW</div>
    </div>
    <a class="back-btn" href="index.html">← Dashboard</a>
  </div>

  <!-- FORM -->
  <div id="ql-form">

    <div class="today-badge" id="today-label"></div>

    <!-- Step 1 -->
    <div class="step" id="step1">
      <div class="step-label">Step 1 — Who did you just see?</div>
      <div class="dropdown-wrap">
        <button class="client-btn" id="client-btn" onclick="toggleDropdown()">
          <span id="client-label">Tap to select client</span>
          <span style="opacity:0.4;font-size:13px;">▼</span>
        </button>
        <div class="dropdown" id="client-dropdown">
          <div class="dropdown-search">
            <input type="text" id="client-search" placeholder="Search by name..."
              oninput="filterClients(this.value)" autocomplete="off">
          </div>
          <div class="dropdown-list" id="client-list"></div>
        </div>
      </div>
    </div>

    <!-- Step 2 -->
    <div class="step locked" id="step2">
      <div class="step-label">Step 2 — Type of session?</div>
      <div class="big-grid">
        <button class="big-btn" onclick="selectType('Intake session', this)">
          <span class="big-btn-icon">📋</span>
          Intake Session
        </button>
        <button class="big-btn" onclick="selectType('Psychotherapy session', this)">
          <span class="big-btn-icon">🧠</span>
          Psychotherapy Session
        </button>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="step locked" id="step3">
      <div class="step-label">Step 3 — How did you meet?</div>
      <div class="big-grid">
        <button class="big-btn" onclick="selectMethod('IP', this)">
          <span class="big-btn-icon">🏢</span>
          In-Person
        </button>
        <button class="big-btn" onclick="selectMethod('V', this)">
          <span class="big-btn-icon">💻</span>
          Virtual
        </button>
      </div>
    </div>

    <!-- Confirm -->
    <div id="confirm-section" style="display:none;">
      <div class="step-label">Confirm &amp; Log</div>
      <div class="confirm-card">
        <div class="confirm-row">
          <span class="confirm-label">Client</span>
          <span class="confirm-value" id="c-name">—</span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Agency</span>
          <span class="confirm-value" id="c-agency">—</span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Fee</span>
          <span class="confirm-value" id="c-fee">—</span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Session Type</span>
          <span class="confirm-value" id="c-type">—</span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Method</span>
          <span class="confirm-value" id="c-method">—</span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Hours</span>
          <span class="confirm-value">2</span>
        </div>
        <div class="confirm-row">
          <span class="confirm-label">Date</span>
          <span class="confirm-value" id="c-date">—</span>
        </div>
      </div>
      <button class="log-btn" onclick="submitLog()">✓ Log Session</button>
    </div>

  </div>

  <!-- SUCCESS -->
  <div class="success" id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">Session Logged</div>
    <div class="success-sub" id="success-detail"></div>
    <div class="success-time" id="success-time"></div>
    <button class="again-btn" onclick="resetForm()">+ Log Another Session</button>
    <a class="main-app-link" href="lcsw-tracker.html">Go to full dashboard →</a>
  </div>

</div>

<script>
// ============================================================
// STORAGE — shared with main app
// ============================================================
const SESSIONS_KEY = 'lmsw_sessions';
const CLIENTS_KEY = 'lmsw_clients';

function loadData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch { return []; }
}

function saveData(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ============================================================
// STATE
// ============================================================
let state = { client: null, type: null, method: null };

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  const now = new Date();
  const [y, m, d] = now.toISOString().split('T')[0].split('-');
  document.getElementById('today-label').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('c-date').textContent = `${m}/${d}/${y}`;
});

// Close dropdown on outside click
document.addEventListener('click', e => {
  const dd = document.getElementById('client-dropdown');
  const btn = document.getElementById('client-btn');
  if (dd && btn && !dd.contains(e.target) && !btn.contains(e.target)) {
    dd.style.display = 'none';
  }
});

// ============================================================
// CLIENT DROPDOWN
// ============================================================
function toggleDropdown() {
  const dd = document.getElementById('client-dropdown');
  const isOpen = dd.style.display === 'block';
  if (isOpen) { dd.style.display = 'none'; return; }
  dd.style.display = 'block';
  document.getElementById('client-search').value = '';
  filterClients('');
  setTimeout(() => document.getElementById('client-search').focus(), 100);
}

function filterClients(val) {
  const clients = loadData(CLIENTS_KEY).filter(c => c.status === 'active');
  const filtered = val
    ? clients.filter(c => c.name.toLowerCase().includes(val.toLowerCase()))
    : clients;
  const sorted = filtered.sort((a, b) => a.name.localeCompare(b.name));
  const list = document.getElementById('client-list');
  if (!sorted.length) {
    list.innerHTML = '<div style="padding:16px 18px;color:var(--text3);font-size:14px;">No clients found</div>';
    return;
  }
  list.innerHTML = sorted.map(c => `
    <div class="dropdown-item" onclick="selectClient(${JSON.stringify(c).replace(/"/g, '&quot;')})">
      <span>${c.name}</span>
      <span class="badge badge-${c.agency.toLowerCase()}">${c.agency}</span>
    </div>
  `).join('');
}

function selectClient(c) {
  state.client = c;
  document.getElementById('client-label').textContent = c.name;
  document.getElementById('client-btn').classList.add('selected');
  document.getElementById('client-dropdown').style.display = 'none';

  // Unlock step 2
  document.getElementById('step2').classList.remove('locked');

  // Pre-select default method silently
  state.method = c.method;

  updateConfirm();
}

// ============================================================
// SESSION TYPE
// ============================================================
function selectType(type, el) {
  state.type = type;
  document.querySelectorAll('#step2 .big-btn').forEach(b => b.classList.remove('type-selected'));
  el.classList.add('type-selected');

  // Unlock step 3
  document.getElementById('step3').classList.remove('locked');

  // Pre-highlight default method button
  const defaultMethod = state.client?.method;
  document.querySelectorAll('#step3 .big-btn').forEach(b => {
    b.classList.remove('method-selected');
    const isIP = b.textContent.includes('In-Person') && defaultMethod === 'IP';
    const isV = b.textContent.includes('Virtual') && defaultMethod === 'V';
    if (isIP || isV) b.classList.add('method-selected');
  });

  updateConfirm();
}

// ============================================================
// METHOD
// ============================================================
function selectMethod(method, el) {
  state.method = method;
  document.querySelectorAll('#step3 .big-btn').forEach(b => b.classList.remove('method-selected'));
  el.classList.add('method-selected');
  updateConfirm();
}

// ============================================================
// CONFIRM
// ============================================================
function updateConfirm() {
  if (!state.client || !state.type || !state.method) {
    document.getElementById('confirm-section').style.display = 'none';
    return;
  }
  const c = state.client;
  const now = new Date();
  const [y, m, d] = now.toISOString().split('T')[0].split('-');
  const agencyNames = { DC: 'District Counseling', SMS: 'Safe Mind Space', Emora: 'Emora', ME: 'Private' };

  document.getElementById('c-name').textContent = c.name;
  document.getElementById('c-agency').textContent = agencyNames[c.agency] || c.agency;
  document.getElementById('c-fee').textContent = '$' + c.rate;
  document.getElementById('c-type').textContent = state.type;
  document.getElementById('c-method').textContent = state.method === 'IP' ? 'In-Person' : 'Virtual';
  document.getElementById('c-date').textContent = `${m}/${d}/${y}`;
  document.getElementById('confirm-section').style.display = 'block';

  // Scroll to confirm
  setTimeout(() => {
    document.getElementById('confirm-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

// ============================================================
// SUBMIT
// ============================================================
function submitLog() {
  if (!state.client || !state.type || !state.method) return;
  const c = state.client;
  const today = new Date().toISOString().split('T')[0];
  const sessions = loadData(SESSIONS_KEY);
  sessions.push({
    id: uid(),
    date: today,
    name: c.name,
    agency: c.agency,
    hours: 2,
    fee: c.rate,
    method: state.method,
    desc: state.type,
    type: 'clinical',
    insurance: c.insurance || '',
  });
  saveData(SESSIONS_KEY, sessions);

  // Show success
  const now = new Date();
  document.getElementById('success-detail').textContent =
    `${c.name} · ${state.type} · $${c.rate}`;
  document.getElementById('success-time').textContent =
    now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) + ' · ' +
    now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  document.getElementById('ql-form').style.display = 'none';
  const successEl = document.getElementById('success-screen');
  successEl.style.display = 'flex';
  successEl.scrollIntoView();
}

// ============================================================
// RESET
// ============================================================
function resetForm() {
  state = { client: null, type: null, method: null };

  document.getElementById('client-label').textContent = 'Tap to select client';
  document.getElementById('client-btn').classList.remove('selected');
  document.getElementById('client-dropdown').style.display = 'none';

  document.querySelectorAll('.big-btn').forEach(b => {
    b.classList.remove('type-selected', 'method-selected');
  });

  document.getElementById('step2').classList.add('locked');
  document.getElementById('step3').classList.add('locked');
  document.getElementById('confirm-section').style.display = 'none';

  document.getElementById('ql-form').style.display = 'block';
  document.getElementById('success-screen').style.display = 'none';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
